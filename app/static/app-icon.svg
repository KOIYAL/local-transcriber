<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" role="img" aria-labelledby="title desc">
  <title id="title">Local Transcriber app icon</title>
  <desc id="desc">An indigo rounded-square app icon where an amber sound wave settles into a straight line above two white text lines, expressing speech turning into text.</desc>
  <defs>
    <linearGradient id="bg" x1="128" y1="128" x2="896" y2="896" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#4338ca"/>
      <stop offset="0.55" stop-color="#312e81"/>
      <stop offset="1" stop-color="#1e1b4b"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.38" cy="0.4" r="0.75">
      <stop offset="0" stop-color="#818cf8" stop-opacity="0.35"/>
      <stop offset="1" stop-color="#818cf8" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect x="64" y="64" width="896" height="896" rx="200" fill="url(#bg)"/>
  <rect x="64" y="64" width="896" height="896" rx="200" fill="url(#glow)"/>
  <path
    d="M240 420
       C 265 336, 290 336, 315 420
       S 365 504, 390 420
       S 440 352, 465 420
       S 515 474, 540 420
       S 580 420, 620 420
       L 784 420"
    fill="none"
    stroke="#f59e0b"
    stroke-width="58"
    stroke-linecap="round"
    stroke-linejoin="round"/>
  <path d="M240 592H712" stroke="#ffffff" stroke-width="58" stroke-linecap="round" opacity="0.95"/>
  <path d="M240 748H560" stroke="#ffffff" stroke-width="58" stroke-linecap="round" opacity="0.55"/>
</svg>
